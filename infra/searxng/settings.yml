# SearXNG settings for TG-Research (baked to /etc/searxng/settings.yml).
# The ONLY setting that has no env-var override is search.formats — JSON must be
# enabled here or ?format=json returns 403. secret_key is overridden at runtime
# by $SEARXNG_SECRET. limiter:false = usable server-to-server with no Valkey/Redis.
use_default_settings: true

general:
  instance_name: "tg-research-searxng"

server:
  secret_key: "overridden-by-SEARXNG_SECRET-env"
  limiter: false          # internal server-to-server: no bot gating, no Valkey
  public_instance: false
  image_proxy: false

search:
  formats:
    - html
    - json

# OPTIONAL — route engine traffic through a rotating/residential proxy at scale.
# Do NOT put proxy credentials in this file. Set ROTATING_PROXY as a Railway
# secret; proxy-entrypoint.sh generates an ephemeral settings file at boot.
# outgoing:
#   request_timeout: 10.0
#   max_request_timeout: 20.0
#   retries: 1
#   proxies:
#     all://:
#       - http://USER:PASS@gw.dataimpulse.com:823
